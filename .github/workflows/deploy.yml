name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: asia-east1
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: asia-east1-docker.pkg.dev
  IMAGE: asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zumeet/api

jobs:
  # ─── Go Tests ────────────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zumeet_test
          POSTGRES_USER: zumeet
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zumeet -d zumeet_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Apply schema
        run: |
          PGPASSWORD=secret psql -h localhost -U zumeet -d zumeet_test -f db/schema.sql
          PGPASSWORD=secret psql -h localhost -U zumeet -d zumeet_test -f db/seed.sql
        env:
          PGPASSWORD: secret

      - name: Run tests
        run: go test ./... -count=1 -race -timeout 120s
        env:
          APP_ENV: test
          DATABASE_URL: postgres://zumeet:secret@localhost:5432/zumeet_test
          JWT_SECRET: test-jwt-secret-at-least-32-chars-long
          ADMIN_JWT_SECRET: test-admin-jwt-secret-32-chars-long!
          GOOGLE_TOKEN_URL: http://localhost:8080/test/oauth/google

  # ─── Frontend Build Check ────────────────────────────────────────────────────
  build-web:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.zumeet.tw

  # ─── Build & Push API image ──────────────────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: [test-api, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=true

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Cloud Run ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-api
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          SHA_TAG="${{ env.IMAGE }}:$(echo ${{ github.sha }} | cut -c1-7)"
          gcloud run deploy zumeet-api \
            --image "$SHA_TAG" \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet

      # Frontend is deployed to Vercel automatically via Vercel GitHub integration
      # No manual step needed here
