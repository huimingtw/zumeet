worker_processes 1;
events { worker_connections 1024; }

http {
    # Single-origin dev reverse proxy used for tunneling web + api through one
    # ngrok domain. Both upstreams are reachable via docker-compose service DNS.
    upstream api { server api:8080; }
    upstream web { server web:3000; }
    upstream storage { server storage:9000; }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    server {
        listen 80;

        client_max_body_size 10m;

        # Backend HTML admin lives on a separate vhost in prod (admin.zumeet.tw);
        # for the dev tunnel we only proxy the JSON API + the OAuth routes.
        location /api/ {
            proxy_pass http://api;
        }

        location = /api {
            proxy_pass http://api;
        }

        # Serve MinIO photos same-origin so browsers don't block them as
        # public->loopback (Private Network Access). Trailing slash strips
        # the /storage/ prefix: /storage/zumeet/key -> /zumeet/key on MinIO.
        location /storage/ {
            proxy_pass http://storage/;
        }

        location / {
            proxy_pass http://web;
        }
    }
}
