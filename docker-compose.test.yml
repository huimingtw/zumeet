services:
  db:
    environment:
      POSTGRES_DB: zumeet_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zumeet -d zumeet_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    environment:
      APP_ENV: test
      AUTH_PROVIDER: mock
      ENABLE_TEST_ENDPOINTS: "true"
      DATABASE_URL: postgres://zumeet:secret@db:5432/zumeet_test
      # Keep GOOGLE_TOKEN_URL for any tests that exercise the full OAuth redirect flow
      GOOGLE_TOKEN_URL: http://api:8080/test/oauth/google

  e2e:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    working_dir: /app
    volumes:
      - ./apps/e2e:/app
    depends_on:
      web:
        condition: service_started
    environment:
      BASE_URL: http://web:3000
      API_URL: http://api:8080
    command: sh -c "npm ci && npx playwright test"
