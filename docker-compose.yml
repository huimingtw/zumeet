services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zumeet
      POSTGRES_USER: zumeet
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./apps/api/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zumeet -d zumeet"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env.local
    environment:
      DATABASE_URL: postgres://zumeet:secret@db:5432/zumeet
      STORAGE_ENDPOINT: storage:9000
      STORAGE_PUBLIC_URL: http://localhost:9000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_IMAGE_UNOPTIMIZED: "true"
    env_file:
      - ./apps/web/.env.local
    depends_on:
      - api
    ports:
      - "3000:3000"

  # Single-origin dev reverse proxy: lets web + api share one ngrok tunnel so
  # cookies, CORS, and OAuth callbacks all live on the same host. Not used in
  # production (Cloud Run handles routing there).
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    volumes:
      - ./infra/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:80"

volumes:
  postgres_data:
  minio_data:
